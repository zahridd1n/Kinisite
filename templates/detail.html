<!-- movies/templates/movies/detail.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ movie.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #e0e0e0; font-family: sans-serif; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .meta { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
    .meta span { margin-right: 16px; }

    /* Video player */
    .player-wrap {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    video {
      width: 100%;
      display: block;
      max-height: 70vh;
    }

    .description {
      line-height: 1.7;
      color: #ccc;
      margin-top: 16px;
    }

    a { color: #4a9eff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back { display: inline-block; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="container">
  <a href="{% url 'home' %}" class="back">← Barcha kinolar</a>

  <h1>{{ movie.title }}</h1>
  <div class="meta">
    {% if movie.year %}<span>📅 {{ movie.year }}</span>{% endif %}
    {% if movie.genre %}<span>🎬 {{ movie.genre }}</span>{% endif %}
    <span>👁 {{ movie.views }} marta ko'rilgan</span>
  </div>

  <div class="player-wrap">
    <video
      controls
      preload="metadata"
      playsinline
    >
      <source src="{% url 'stream_video' movie.pk %}" type="video/mp4">
      Brauzeringiz video ni qo'llab-quvvatlamaydi.
    </video>
  </div>

  {% if movie.description %}
  <div class="description">
    <strong>Tavsif:</strong><br>
    {{ movie.description|linebreaks }}
  </div>
  {% endif %}
</div>
</body>
</html>
