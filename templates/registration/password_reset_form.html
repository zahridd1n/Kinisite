{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineUZ — Parolni tiklash</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="{% url 'home' %}" class="navbar-brand">
          CINE<span>UZ</span>
        </a>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Parolni tiklash</h1>
      <p class="auth-subtitle">Email manzilingizni kiriting va parolni tiklash havolasini yuboramiz</p>

      <!-- Error Message -->
      {% if form.email.errors %}
      <div class="alert alert-danger auth-alert" role="alert">
        <i class="bi bi-exclamation-circle"></i>
        {% for error in form.email.errors %}
          {{ error }}
        {% endfor %}
      </div>
      {% endif %}

      <!-- Password Reset Form -->
      <form method="POST" class="auth-form">
        {% csrf_token %}
        
        <div class="form-group">
          <label for="id_email" class="form-label">Email manzil</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input
              type="email"
              id="id_email"
              name="email"
              class="form-control"
              placeholder="Email manzilingiz"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-btn">
          <i class="bi bi-send"></i>
          Havolani yuborish
        </button>
      </form>

      <!-- Back to Login -->
      <p class="auth-footer-text">
        <a href="{% url 'login' %}" class="auth-link">
          <i class="bi bi-arrow-left"></i>
          Kirish sahifasiga qaytish
        </a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
