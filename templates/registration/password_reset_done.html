{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineUZ — Email yuborildi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="{% url 'home' %}" class="navbar-brand">
          CINE<span>UZ</span>
        </a>
      </div>

      <!-- Success Icon -->
      <div class="auth-success-icon">
        <i class="bi bi-envelope-check"></i>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Email yuborildi</h1>
      <p class="auth-subtitle">
        Agar email bazamizda mavjud bo'lsa, sizga parolni tiklash havolasi yuborildi.
      </p>

      <!-- Info Box -->
      <div class="auth-info-box">
        <i class="bi bi-info-circle"></i>
        <p>Emailingizni tekshiring va havolani bosing</p>
      </div>

      <!-- Back to Login -->
      <p class="auth-footer-text">
        <a href="{% url 'login' %}" class="auth-link">
          <i class="bi bi-arrow-left"></i>
          Kirish sahifasiga qaytish
        </a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
