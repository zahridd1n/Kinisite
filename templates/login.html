{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineUZ — Kirish</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="{% url 'home' %}" class="navbar-brand">
          CINE<span>UZ</span>
        </a>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Tizimga kirish</h1>
      <p class="auth-subtitle">Hisobingizga kiring va kinolarni tomosha qiling</p>

      <!-- Error Message -->
      {% if error %}
      <div class="alert alert-danger auth-alert" role="alert">
        <i class="bi bi-exclamation-circle"></i>
        {{ error }}
      </div>
      {% endif %}

      <!-- Login Form -->
      <form method="POST" class="auth-form" id="loginForm">
        {% csrf_token %}
        
        <div class="form-group">
          <label for="username" class="form-label">Foydalanuvchi nomi</label>
          <div class="input-wrapper">
            <i class="bi bi-person input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Foydalanuvchi nomi"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Parol</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Parol"
              required
            >
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span class="checkmark"></span>
            Eslab qolish
          </label>
          <a href="{% url 'password_reset' %}" class="forgot-link">Parolni unutdingizmi?</a>
        </div>

        <button type="submit" class="btn btn-primary auth-btn">
          <i class="bi bi-box-arrow-in-right"></i>
          Kirish
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>yoki</span>
      </div>

      <!-- Google OAuth -->
      <a href="/accounts/google/login/" class="btn btn-google">
        <i class="bi bi-google"></i>
        Google bilan kirish
      </a>

      <!-- Signup Link -->
      <p class="auth-footer-text">
        Hisobingiz yo'qmi?
        <a href="{% url 'signup' %}" class="auth-link">Ro'yxatdan o'ting</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
